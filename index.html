<!DOCTYPE html>

<html land="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1"/>
    <title>Gazetteer</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="assets/favicon/site.webmanifest">
    <link rel="stylesheet" href="libs/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="libs/leaflet/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="libs/easybutton/src/easy-button.css">
    <link rel="stylesheet" href="libs/markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="libs/markercluster/dist/MarkerCluster.default.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="w-100 h-100 m-0">

    <div class="pre-load" id="pre-load-page"></div>

    <div class="w-100 h-100 position-absolute" id="map"></div>

    <div class="w-100 h-100 position-absolute pe-none" id="overlay">
        <div class="w-100 h-100 d-flex align-items-center justify-content-center">
            <img src="assets/images/crosshair.png" id="crosshair">
        </div>
        <div class="position-absolute start-50 translate-middle-x bottom-0 mb-4 bg-light shadow-sm rounded d-flex flex-row justify-content-around align-items-center pe-auto" id="latlng">
            <input class="form-control d-inline-flex shadow" id="lat">
            <input class="form-control d-inline-flex shadow" id="lng">
            <button class="btn btn-outline-dark border-secondary shadow" id="search"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </div>

    <div class="w-100 position-fixed top-0 pe-none pt-2">
        <select class="form-select mx-auto shadow-sm pe-auto" id="dropdown"></select>
    </div>

    <div aria-labelledby="modal-title" tabindex="-1" class="modal fade" id="modal">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <img src="assets/images/unknown.png" class="display-inline" id="flag">
                    <h1 class="modal-title fs-5" id="modal-title"></h1>
                    <button type="button" aria-label="Close" data-bs-dismiss="modal" class="btn-close"></button>
                </div>
                <div class="modal-body pt-0 pb-0 overflow-x-hidden" id="modal-body">
                    <div class="pre-load" id="pre-load-modal"></div>
                    <div id="modal-body-container"></div>
                </div>
                <div class="modal-footer d-flex justify-content-between flex-nowrap">
                    <div class="m-0" id="modal-footer-container"></div>
                    <button type="button" data-bs-dismiss="modal" class="btn btn-outline-dark">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="libs/jquery/jquery-3.7.1.min.js"></script>
    <script src="libs/bootstrap/js/bootstrap.min.js"></script>
    <script src="libs/fontawesome/js/all.min.js"></script>
    <script src="libs/leaflet/leaflet.js" crossorigin=""></script>
    <script src="libs/easybutton/src/easy-button.js"></script>
    <script src="libs/glyphs/Leaflet.Icon.Glyph.js"></script>
    <script src="libs/markercluster/dist/leaflet.markercluster.js"></script>
    <script src="libs/chartjs/chart.umd.js"></script>
    <script src="js/functions.js"></script>

</body>

</html>
