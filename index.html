<!DOCTYPE html>

<html lang="en">
    
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1"/>
    <title>Gazetteer</title>
    <link rel="stylesheet" href="libs/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="libs/leaflet/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="libs/easybutton/src/easy-button.css">
    <link rel="stylesheet" href="libs/markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="pre-load" id="pre-load-page"></div>

    <div class="h-100 w-100 position-absolute" id="map"></div>

    <div class="h-100 w-100 position-absolute pe-none" id="overlay-container">
        <div class="h-100 w-100 d-flex align-items-center justify-content-center">
            <img id="crosshair" src="assets/crosshair.png">
        </div>
        <div class="position-absolute start-50 translate-middle-x bg-light shadow-sm rounded d-flex flex-row justify-content-around align-items-center pe-auto" id="latlng-container">
            <input class="form-control d-inline-flex shadow" id="lat">
            <input class="form-control d-inline-flex shadow" id="lng">
            <button class="btn btn-outline-dark border-secondary shadow" id="latlng-search"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </div>

    <div class="w-100 position-fixed top-0 pe-none" id="dropdown-container">
        <select class="form-select shadow-sm pe-auto" id="dropdown"></select>
    </div>

    <script src="libs/jquery/jquery-3.7.1.min.js"></script>
    <script src="libs/bootstrap/js/bootstrap.min.js"></script>
    <script src="libs/fontawesome/js/all.min.js"></script>
    <script src="libs/leaflet/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="libs/easybutton/src/easy-button.js"></script>
    <script src="libs/glyphs/Leaflet.Icon.Glyph.js"></script>
    <script src="libs/markercluster/dist/leaflet.markercluster.js"></script>
    <script src="js/functions.js"></script>

</body>

</html>
